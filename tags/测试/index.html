    .top-nav .links a {

    h3 { font-size: 1.05rem; margin: 1.2rem 0 0.3rem; color: var(--text); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-glow); }
    p { margin-bottom: 0.8rem; }
    ul, ol { margin: 0.5rem 0 0.8rem 1.5rem; }
    li { margin: 0.3rem 0; }
    code {
      background: var(--card); color: var(--text);
      padding: 0.1rem 0.4rem; border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: var(--card); border: 1px solid var(--border);
      padding: 1rem; overflow-x: auto; margin: 0.8rem 0;
      border-radius: 3px;
    }
    pre code { background: none; padding: 0; }
    blockquote {
      border-left: 3px solid var(--accent);
      background: rgba(139,58,58,0.08);
      padding: 0.5rem 1rem; margin: 0.8rem 0;
      color: #a89878; font-style: italic;
    }
    hr { border: none; border-top: 1px solid var(--divider); margin: 1.5rem 0; }
    table { border-collapse: collapse; width: 100%; margin: 0.8rem 0; }
    th, td { border: 1px solid var(--border); padding: 0.4rem 0.8rem; text-align: left; }
    th { background: var(--card); color: var(--heading); font-weight: 500; }
    /* Post meta */
    .post-date { color: var(--muted); font-size: 0.82rem; margin-bottom: 1.5rem; }
    .post-meta-section { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--divider); }
    .post-meta-section h4 { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.4rem; list-style: none; margin: 0; }
    .tag-list li { margin: 0; }
    .tag-list a {
      display: inline-block; padding: 0.15rem 0.6rem;
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); font-size: 0.78rem; text-decoration: none;
      transition: all 0.2s;
    }
    .tag-list a:hover { border-color: var(--accent); color: var(--heading); }
    /* Archive / list pages */
    .post-item {

    }
    .post-item h2 { font-size: 1rem; margin: 0 0 0.2rem; }
    .post-item h2 a { color: var(--heading); text-decoration: none; }
    .post-item h2 a:hover { color: var(--accent); }
    .post-item .meta { font-size: 0.78rem; color: var(--muted); }
