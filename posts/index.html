<head>
<meta charset="UTF-8">

<title>文章 — 梁睿</title>
<style>
  :root {
    --bg: #1a1410; --card: #231e18; --text: #c4b99a;
    --heading: #d9ceb5; --muted: #7a6e5d; --accent: #8b3a3a;
    --border: #3a3028; --divider: #2a241c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    display:flex; justify-content:center; padding:3rem 1rem; line-height:1.7;
  }
  .page { max-width:640px; width:100%; }
  h1 {
    font-family:Georgia,"Noto Serif SC",serif;
    font-size:2.2rem; font-weight:400; color:var(--heading);
    margin-bottom:0.3rem; letter-spacing:-0.5px;
  }
  .back { margin-bottom:2rem; }
  .back a { color:var(--muted); text-decoration:none; font-size:0.85rem; }
  .back a:hover { color:var(--accent); }
  .post {
    padding:1.2rem 0; border-bottom:1px solid var(--divider);
  }
  .post h2 { font-size:1.05rem; font-weight:500; margin-bottom:0.2rem; }
  .post h2 a { color:var(--heading); text-decoration:none; }
  .post h2 a:hover { color:var(--accent); }
  .post .meta { font-size:0.75rem; color:var(--muted); }
  footer { margin-top:2.5rem; text-align:center; }
  footer a { color:var(--muted); text-decoration:none; font-size:0.85rem; }
  footer a:hover { color:var(--accent); }
</style>
</head>
