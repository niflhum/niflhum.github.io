<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目 — Niflhum</title>
<style>
  :root {
    --bg: #1a1410; --card: #231e18; --text: #c4b99a;
    --heading: #d9ceb5; --muted: #7a6e5d; --accent: #8b3a3a;
    --border: #3a3028; --divider: #2a241c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    display:flex; justify-content:center; padding:3rem 1rem; line-height:1.7;
  }
  .page { max-width:640px; width:100%; }
  h1 {
    font-family:Georgia,"Noto Serif SC",serif;
    font-size:2.2rem; font-weight:400; color:var(--heading);
    margin-bottom:0.3rem; letter-spacing:-0.5px;
  }
  .back { margin-bottom:2rem; }
  .back a { color:var(--muted); text-decoration:none; font-size:0.85rem; }
  .back a:hover { color:var(--accent); }
  .project {
    background:var(--card); border:1px solid var(--border);
    padding:1.2rem; margin-bottom:0.8rem;
    display:flex; justify-content:space-between; align-items:flex-start;
    flex-wrap:wrap; gap:0.5rem;
  }
  .project h2 { font-size:1rem; font-weight:500; color:var(--heading); }
  .project p { font-size:0.85rem; color:var(--text); margin-top:0.3rem; }
  .project .lang { font-size:0.7rem; color:var(--muted); white-space:nowrap; }
  .project a { color:inherit; text-decoration:none; }
  .project:hover { border-color:var(--accent); }
  .section-title {
    font-size:0.7rem; color:var(--muted); text-transform:uppercase;
    letter-spacing:0.12em; margin:2rem 0 0.8rem; font-weight:500;
  }
  .gh-repo {
    display:block; padding:0.6rem 0.8rem; border-bottom:1px solid var(--divider);
    text-decoration:none; color:var(--text); font-size:0.82rem;
    transition:all 0.2s;
  }
  .gh-repo:hover { background:var(--card); color:var(--heading); }
  .gh-repo .name { color:var(--heading); font-weight:500; }
  .gh-repo .desc { color:var(--muted); font-size:0.75rem; margin-top:0.15rem; }
  footer { margin-top:2.5rem; color:var(--muted); font-size:0.85rem; text-align:center; }
  footer a { color:var(--muted); }
</style>
</head>
<body>
<div class="page">
  <div class="back"><a href="/">← Niflhum</a></div>
  <h1>项目</h1>

  <a href="https://github.com/niflhum/machiavelli-library"><div class="project">
    <div><h2>machiavelli-library</h2><p>17 本马基雅维利著作中英双语原文库，可检索</p></div>
    <span class="lang">Markdown</span>
  </div></a>

  <a href="https://github.com/niflhum/machiavelli-skill"><div class="project">
    <div><h2>machiavelli-skill</h2><p>AI 马基雅维利数字分身 · 17 信条 · 14 案例</p></div>
    <span class="lang">Markdown</span>
  </div></a>

  <a href="https://github.com/niflhum/gwsw"><div class="project">
    <div><h2>gwsw</h2><p>纯浏览器端 OCR 文字识别工具</p></div>
    <span class="lang">JavaScript</span>
  </div></a>

  <a href="https://github.com/niflhum/niflhum.github.io"><div class="project">
    <div><h2>niflhum.top</h2><p>个人网站 · 数字花园 · 本书房主题</p></div>
    <span class="lang">HTML/CSS</span>
  </div></a>

  <div class="section-title">更多仓库</div>
  <div id="gh-dynamic"></div>

  <footer><a href="https://github.com/niflhum">GitHub 全部仓库 →</a></footer>
</div>
<script>
  const CURATED = ['machiavelli-library','machiavelli-skill','gwsw','niflhum.github.io'];
  fetch('/garden/github-activity.json')
    .then(r => r.json())
    .then(data => {
      if (!data.repos || !data.repos.length) return;
      const others = data.repos.filter(r => !CURATED.includes(r.name));
      if (!others.length) return;
      document.getElementById('gh-dynamic').innerHTML = others.map(r =>
        `<a href="${r.url}" class="gh-repo" target="_blank">
          <span class="name">${r.name}</span>
          <span style="color:var(--muted);font-size:0.7rem;"> · ${r.language||''} ${r.stars?'★'+r.stars:''}</span>
          <div class="desc">${r.description||''}</div>
        </a>`).join('');
    }).catch(()=>{});
</script>
</body>
</html>
