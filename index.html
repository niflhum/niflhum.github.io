<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>梁睿 - 热爱手搓的程序员</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
    }
    .container {
      max-width: 680px;
      width: 100%;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.3rem;
      color: #ffffff;
      font-weight: 700;
    }
    .tagline {
      font-size: 1.2rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .status-card {
      background: #151515;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .status-card h2 {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .status-item {
      display: flex;
      align-items: center;
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
    }
    .status-item:last-child {
      margin-bottom: 0;
    }
    .status-icon {
      margin-right: 0.75rem;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .quick-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .quick-link {
      padding: 0.75rem 1.5rem;
      background: #151515;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .quick-link:hover {
      background: #222;
      border-color: #555;
      color: #fff;
    }
    footer {
      margin-top: 3rem;
      color: #555;
      font-size: 0.9rem;
      text-align: center;
    }
    /* 移动端适配 */
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .tagline { font-size: 1rem; }
      .quick-links { flex-direction: column; }
      .quick-link { text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>梁睿</h1>
    <p class="tagline">热爱手搓的程序员</p>

    <div class="status-card">
      <h2>正在做什么</h2>
      <div class="status-item">
        <span class="status-icon">🔨</span>
        <span>QClaw/Hermes 插件系统调试与文档编写</span>
      </div>
      <div class="status-item">
        <span class="status-icon">📖</span>
        <span>在读：《康熙的红票》《被统治的艺术》</span>
      </div>
      <div class="status-item">
        <span class="status-icon">💭</span>
        <span>最近想法：马基雅维利的"命运"概念是一种概率论</span>
      </div>
    </div>

    <div class="quick-links">
      <a href="/posts/" class="quick-link">📝 文章</a>
      <a href="/garden/" class="quick-link">🌿 知识库</a>
      <a href="/projects/" class="quick-link">💻 项目</a>
      <a href="https://github.com/niflhum" class="quick-link">🐙 GitHub</a>
    </div>

    <div id="dynamic-projects" style="margin-top:2rem; display:flex; flex-wrap:wrap; gap:0.8rem;"></div>

    <footer>
      <p>Things change, roll with it.</p>
    </footer>
  </div>
  <script>
    fetch('/garden/github-activity.json')
      .then(r => r.json())
      .then(data => {
        if (!data.repos || !data.repos.length) return;
        const list = data.repos.map(r =>
          `<a href="${r.url}" class="project-card" target="_blank">
            <strong>${r.name}</strong>
            <span>${r.description || ''}</span>
            <small>${r.language || ''} ${r.stars ? '★' + r.stars : ''}</small>
          </a>`
        ).join('');
        const el = document.getElementById('dynamic-projects');
        if (el) el.innerHTML = list;
      })
      .catch(console.error);
  </script>
</body>
</html>
