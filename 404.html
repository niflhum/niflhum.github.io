<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Niflhum</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#1a1410">
  <style>
    :root {
      --bg: #1a1410; --card: #231e18; --text: #c4b99a;
      --heading: #d9ceb5; --muted: #7a6e5d;
      --accent: #8b3a3a; --border: #3a3028;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:2rem; line-height:1.7; text-align:center;
      font-family:Georgia,"Noto Serif SC",serif; }
    .card { background:var(--card); border:1px solid var(--border);
      border-radius:2px; padding:3rem 2rem; max-width:420px; }
    h1 { font-size:3rem; color:var(--heading); font-weight:400; }
    p { font-size:0.9rem; margin:1.5rem 0; color:var(--muted); }
    a { color:var(--text); text-decoration:none; padding:0 1rem;
      border-bottom:1px solid var(--border); transition:0.2s; }
    a:hover { color:var(--heading); border-bottom-color:var(--accent); }
    .nav { display:flex; gap:0; justify-content:center; font-size:0.82rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <p>此页无纸，墨水未到。</p>
    <div class="nav">
      <a href="/">首页</a>
      <a href="/garden/">缪斯花园</a>
      <a href="/machiavelli-library/">图书馆</a>
    </div>
  </div>
</body>
</html>
